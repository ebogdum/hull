title: Hull
description: >-
  Hull — a Kubernetes package manager built around expression-based templating,
  layered composition, and dependency-aware orchestration.
url: "https://ebogdum.github.io"
baseurl: "/hull"

# Themed via just-the-docs over GitHub Pages' remote-theme plugin.
remote_theme: just-the-docs/just-the-docs@v0.7.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# ---- just-the-docs ----
color_scheme: hull
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true

heading_anchors: true

# Sidebar footer + repo links
aux_links:
  "GitHub":
    - "https://github.com/ebogdum/hull"
aux_links_new_tab: true

nav_external_links:
  - title: "Hull on GitHub"
    url: "https://github.com/ebogdum/hull"
    hide_icon: false

back_to_top: true
back_to_top_text: "Back to top"

footer_content: >-
  Hull documentation · built with Jekyll & just-the-docs.

last_edit_timestamp: false
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/ebogdum/hull"
gh_edit_branch: "main"
gh_edit_source: docs
gh_edit_view_mode: "tree"

# Colored callout boxes: use with `{: .note }`, `{: .warning }`, etc.
callouts_level: quiet
callouts:
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
  important:
    title: Important
    color: purple
  warning:
    title: Warning
    color: yellow
  danger:
    title: Danger
    color: red

# Render mermaid ```mermaid fences.
mermaid:
  version: "9.1.6"

# Files Jekyll should not treat as pages.
exclude:
  - "*.py"
  - vendor
  - Gemfile
  - Gemfile.lock

kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false
