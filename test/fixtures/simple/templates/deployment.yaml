apiVersion: apps/v1
kind: Deployment
metadata:
  name: "${values.name}"
  labels:
    app: "${values.name}"
spec:
  replicas: ${values.replicas}
  selector:
    matchLabels:
      app: "${values.name}"
  template:
    metadata:
      labels:
        app: "${values.name}"
    spec:
      containers:
        - name: "${values.name}"
          image: "${values.image.repository}:${values.image.tag}"
