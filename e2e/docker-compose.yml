services:
  k3s:
    image: rancher/k3s:v1.31.4-k3s1
    command: server --disable=traefik --disable=metrics-server --disable=servicelb
    privileged: true
    tmpfs:
      - /run
      - /var/run
    environment:
      - K3S_KUBECONFIG_OUTPUT=/output/kubeconfig.yaml
      - K3S_KUBECONFIG_MODE=666
    volumes:
      - k3s-output:/output
      - k3s-data:/var/lib/rancher/k3s
    ports:
      - "6443:6443"
    healthcheck:
      test: ["CMD", "kubectl", "get", "nodes"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

volumes:
  k3s-output:
  k3s-data:
